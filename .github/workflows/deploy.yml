name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: 130.61.236.188
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e  # This forces the script to stop immediately if an error occurs
            cd /home/ubuntu/Fit_Agent
            git pull origin main
            
            # Create the virtual environment if it is missing
            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi
            
            source .venv/bin/activate
            
            # Install normally, dropping the editable (-e) flag
            pip install . --quiet
            
            sudo systemctl restart fitagent
            echo "Deployed successfully!"